<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome - Login or Register</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Centers the single auth card */
      .auth-container {
        max-width: 400px;
        margin: 4rem auto;
      }
      .toggle-text {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: var(--dark-pink);
        cursor: pointer;
        font-weight: 600;
      }
      .toggle-text:hover {
        text-decoration: underline;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container auth-container">
      <div class="card">
        <h2 id="form-title" style="text-align: center">Welcome Back</h2>
        <p id="form-subtitle" style="text-align: center; margin-bottom: 1.5rem">
          Login to your account.
        </p>

        <!-- Login Form -->
        <form id="login-form">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" required />
          </div>
          <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <!-- Register Form (Hidden by default) -->
        <form id="register-form" class="hidden">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="reg-fname" required />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="reg-lname" required />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="reg-password" required />
          </div>
          <button type="submit" class="btn btn-secondary">
            Create Account
          </button>
        </form>

        <p class="toggle-text" id="toggle-btn">
          Don't have an account? Register here.
        </p>
      </div>
    </div>

    <script src="auth.js"></script>
  </body>
</html>
