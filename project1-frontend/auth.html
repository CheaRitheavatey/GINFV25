<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login / Register</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="split-layout">
        <!-- login Form -->
        <div class="card">
          <h2>Welcome Back</h2>
          <p>Login to your account.</p>
          <br />
          <form id="login-form">
            <div class="form-group">
              <label>Email</label>
              <input type="email" placeholder="chef@example.com" required />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" placeholder="********" required />
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
          </form>
        </div>

        <!-- register Form -->
        <div class="card">
          <h2>Create Account</h2>
          <p>Join to share your recipes!</p>
          <br />
          <form id="register-form">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" placeholder="Gordon" required />
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" placeholder="Ramsay" required />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" placeholder="gordon@example.com" required />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" placeholder="********" required />
            </div>
            <button type="submit" class="btn btn-secondary">Register</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
